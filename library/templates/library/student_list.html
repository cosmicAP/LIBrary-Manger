<!DOCTYPE html>
<html>
<head>
    <title> Students</title>
</head>
<body>
<h1>ALL Students</h1>
<a href="/">--back to dashboard--</a> <br> <br>
<a href="/students/add/">| ++ADD student++ |</a> 
<table border="1">
    <tr>
        <th>Name</th>
        <th>Student ID</th>
        <th>Email</th>
        <th>Phone</th>


    </tr>
    {% for student in Students %}
    <tr>
        <td>{{student.name}}</td>
        <td>{{student.student_id}}</td>
        <td>{{student.email}}</td>
        <td>{{student.phone}}</td>
        
        <td>
        <a href="{% url 'student_edit' student.pk %}">EDIT</a> |
        <a href="{% url 'student_delete' student.pk %}">DELETE</a>
        </td>


    </tr>

    {% endfor %}




</table>





</body>

</html>























</html>
